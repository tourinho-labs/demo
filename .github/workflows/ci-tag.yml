name: CI - Tag

on:
  push:
    tags:
      - '[0-9]*'

jobs:
  ci:
    permissions:
      contents: write
      security-events: write
      actions: read
      packages: write
      id-token: write
    # Variante Helm: promove a tag editando o values.yaml no gitops-<app>.
    uses: TourinhoM/org-ci-platform/.github/workflows/ci-tag-helm.yml@main
    # secrets explícito: inherit não atravessa a org.
    secrets:
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
